<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="40" x2="1040" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7FAFF"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="520" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .cardTitle { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .cardText { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .pill { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #0F3F73; }
      .arrowLabel { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #1D4ED8; }
    </style>
  </defs>

  <rect x="30" y="30" width="1140" height="460" rx="28" fill="url(#bg)" stroke="#D9E6F7"/>

  <text x="80" y="105" class="title">How MCP Power Automate Works</text>
  <text x="80" y="135" class="subtitle">Browser-backed auth, explicit flow targeting, and local MCP tools for safe Power Automate work.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="180" width="300" height="220" rx="24" fill="url(#card)" stroke="#D8E1EF"/>
    <rect x="112" y="212" width="96" height="32" rx="16" fill="#DBEAFE"/>
    <text x="131" y="233" class="pill">Browser Side</text>
    <text x="112" y="282" class="cardTitle">Chromium Extension</text>
    <text x="112" y="316" class="cardText">Captures Power Automate session context,</text>
    <text x="112" y="338" class="cardText">tab flow metadata, token audit, and browser snapshots.</text>
    <text x="112" y="370" class="cardText">The browser is the auth source.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="450" y="160" width="300" height="260" rx="24" fill="url(#card)" stroke="#D8E1EF"/>
    <rect x="482" y="192" width="104" height="32" rx="16" fill="#DCFCE7"/>
    <text x="503" y="213" class="pill" fill="#166534">Local Service</text>
    <text x="482" y="262" class="cardTitle">Bridge + MCP Server</text>
    <text x="482" y="296" class="cardText">Runs on your machine with `stdio` MCP and</text>
    <text x="482" y="318" class="cardText">an HTTP bridge on `127.0.0.1:17373`.</text>
    <text x="482" y="350" class="cardText">Lists flows, locks an active target, reads,</text>
    <text x="482" y="372" class="cardText">updates, validates, tests, and reverts.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="180" width="300" height="220" rx="24" fill="url(#card)" stroke="#D8E1EF"/>
    <rect x="852" y="212" width="108" height="32" rx="16" fill="#FCE7F3"/>
    <text x="874" y="233" class="pill" fill="#9D174D">Agent Side</text>
    <text x="852" y="282" class="cardTitle">Codex + Skill</text>
    <text x="852" y="316" class="cardText">Uses `list_flows`, `set_active_flow`,</text>
    <text x="852" y="338" class="cardText">`get_flow`, `update_flow`, runs, and rollback.</text>
    <text x="852" y="370" class="cardText">The skill teaches the safe workflow.</text>
  </g>

  <path d="M380 290H450" stroke="#60A5FA" stroke-width="6" stroke-linecap="round"/>
  <path d="M435 275L450 290L435 305" stroke="#60A5FA" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="385" y="262" class="arrowLabel">session + snapshots</text>

  <path d="M750 290H820" stroke="#60A5FA" stroke-width="6" stroke-linecap="round"/>
  <path d="M805 275L820 290L805 305" stroke="#60A5FA" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="758" y="262" class="arrowLabel">MCP tools</text>

  <rect x="412" y="438" width="376" height="28" rx="14" fill="#E0F2FE"/>
  <text x="445" y="457" class="pill" fill="#075985">Key v2 idea: the target flow is explicit, not whatever tab happens to be active.</text>
</svg>
