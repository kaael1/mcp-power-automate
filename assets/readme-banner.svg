<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MCP Power Automate banner</title>
  <desc id="desc">A minimal banner for MCP Power Automate with browser-backed auth and safer flow operations.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="56" x2="1188" y2="602" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07131F"/>
      <stop offset="0.55" stop-color="#0B2030"/>
      <stop offset="1" stop-color="#102B3D"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0C1E2B"/>
      <stop offset="1" stop-color="#0A1925"/>
    </linearGradient>
    <linearGradient id="accent-a" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4ED7C7"/>
      <stop offset="1" stop-color="#5FA8FF"/>
    </linearGradient>
    <linearGradient id="accent-b" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFD36C"/>
      <stop offset="1" stop-color="#FF8E67"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#4E6979" stroke-opacity="0.15"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#03111A" flood-opacity="0.42"/>
    </filter>
    <style>
      .eyebrow { font: 700 15px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.2em; text-transform: uppercase; fill: #7FD8EA; }
      .title { font: 700 62px 'Segoe UI', Arial, sans-serif; fill: #F3FAFF; }
      .body { font: 400 26px 'Segoe UI', Arial, sans-serif; fill: #D1E6F2; }
      .chip { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #F4FBFF; }
      .footer { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #8FB6C8; }
    </style>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>
  <rect width="1280" height="640" rx="32" fill="url(#grid)"/>
  <circle cx="178" cy="110" r="116" fill="#169DD8" fill-opacity="0.08"/>
  <circle cx="1082" cy="118" r="146" fill="#3FD0C3" fill-opacity="0.08"/>
  <circle cx="1054" cy="536" r="178" fill="#FF996D" fill-opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="56" y="52" width="1168" height="536" rx="28" fill="#081722" fill-opacity="0.8" stroke="#2F4C5F" stroke-opacity="0.72"/>
  </g>

  <g transform="translate(104 112)">
    <text x="0" y="0" class="eyebrow">Local MCP for Power Automate</text>

    <g transform="translate(0 34)">
      <rect x="0" y="0" width="72" height="72" rx="22" fill="url(#accent-a)"/>
      <rect x="54" y="46" width="72" height="72" rx="22" fill="url(#accent-b)"/>
      <rect x="104" y="-18" width="72" height="72" rx="22" fill="#153145" stroke="#88E3D8" stroke-width="3"/>
      <path d="M35 72V116H82" stroke="#D6F8F0" stroke-width="6" stroke-linecap="round"/>
      <path d="M126 18H172V40" stroke="#D6F8F0" stroke-width="6" stroke-linecap="round"/>
    </g>

    <g transform="translate(0 180)">
      <text x="0" y="0" class="title">MCP Power Automate</text>
      <text x="0" y="56" class="body">Browser-backed auth, explicit target locking,</text>
      <text x="0" y="94" class="body">review, rollback.</text>
    </g>

    <g transform="translate(0 360)">
      <rect x="0" y="0" width="164" height="46" rx="23" fill="#133346" stroke="#57CFC5"/>
      <text x="82" y="30" text-anchor="middle" class="chip">Validate</text>
      <rect x="180" y="0" width="150" height="46" rx="23" fill="#16364A" stroke="#79BEF4"/>
      <text x="255" y="30" text-anchor="middle" class="chip">Update</text>
      <rect x="346" y="0" width="126" height="46" rx="23" fill="#19364A" stroke="#F3BD71"/>
      <text x="409" y="30" text-anchor="middle" class="chip">Runs</text>
      <rect x="488" y="0" width="154" height="46" rx="23" fill="#1D3147" stroke="#FF9A72"/>
      <text x="565" y="30" text-anchor="middle" class="chip">Rollback</text>
    </g>

    <text x="0" y="496" class="footer">No Entra app registration required.</text>
  </g>

  <g transform="translate(846 168)">
    <rect x="0" y="0" width="220" height="220" rx="38" fill="url(#glass)" stroke="#35546A"/>

    <rect x="42" y="36" width="136" height="52" rx="18" fill="#102738" stroke="#53D5C7"/>
    <rect x="60" y="52" width="56" height="6" rx="3" fill="#EAF8FF"/>
    <rect x="60" y="66" width="74" height="6" rx="3" fill="#8AC9E5"/>
    <rect x="60" y="80" width="44" height="6" rx="3" fill="#8AC9E5"/>

    <path d="M110 102V128" stroke="#6FB7FF" stroke-width="6" stroke-linecap="round"/>
    <path d="M100 118L110 130L120 118" stroke="#6FB7FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="42" y="142" width="136" height="52" rx="18" fill="#102738" stroke="#7CBFF4"/>
    <rect x="60" y="158" width="72" height="6" rx="3" fill="#EAF8FF"/>
    <rect x="60" y="172" width="50" height="6" rx="3" fill="#6EAFF2"/>
    <rect x="60" y="186" width="58" height="6" rx="3" fill="#48D1C5"/>
  </g>
</svg>
